version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcript_chat
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - webnet

  backend:
    build:
      context: ./chat_backend
    working_dir: /app
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: transcript_chat
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - webnet

  frontend:
    build:
      context: ./chat_front
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    networks:
      - webnet

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - webnet

volumes:
  db_data:

networks:
  webnet:
    driver: bridge
