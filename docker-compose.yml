version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatpass}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./chat_backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./chat_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /usr/src/app
    volumes:
      - ./chat_backend:/usr/src/app:delegated
      - /usr/src/app/node_modules
    command: sh -c "npm ci --silent && npm run dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "3001:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./chat_front
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./chat_front:/app:delegated
      - /app/node_modules
    # Vite dev server listens on 5173 (Dockerfile starts it with --host 0.0.0.0)
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db-data:

networks:
  default:
    name: transcript_chat_network
