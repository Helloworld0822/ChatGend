services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./chat_backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ./chat_backend:/usr/src/app:rw
      - /usr/src/app/node_modules
    command: sh -c "npm ci --silent && npm run dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://chatuser:chatpass@db:5432/chatdb
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
